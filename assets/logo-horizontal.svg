<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 96" fill="none">
  <defs>
    <!-- 噪点纹理 -->
    <filter id="hn" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="3" stitchTiles="stitch" result="n"/>
      <feColorMatrix type="saturate" values="0" in="n" result="g"/>
      <feComponentTransfer in="g" result="a">
        <feFuncA type="linear" slope="0.06" intercept="0"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="a" mode="overlay"/>
    </filter>

    <!-- 脉冲发光 -->
    <filter id="hpg" x="-20%" y="-30%" width="140%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.8" result="b2"/>
      <feMerge>
        <feMergeNode in="b1"/>
        <feMergeNode in="b2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 星芒 -->
    <filter id="hsp" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="b"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="bb"/>
      <feMerge>
        <feMergeNode in="bb"/>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 文字阴影 -->
    <filter id="hds" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000000" flood-opacity="0.4"/>
    </filter>

    <!-- 图标背景渐变 -->
    <radialGradient id="hbg" cx="50%" cy="38%" r="72%" gradientTransform="translate(0,0)">
      <stop offset="0%" stop-color="#1a2030"/>
      <stop offset="60%" stop-color="#0f1319"/>
      <stop offset="100%" stop-color="#080a0e"/>
    </radialGradient>

    <!-- 图标金属边框 -->
    <linearGradient id="hbdr" x1="6" y1="6" x2="84" y2="84" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffeaa0" stop-opacity="0.85"/>
      <stop offset="30%" stop-color="#FCD535" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#c49b1a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffeaa0" stop-opacity="0.7"/>
    </linearGradient>

    <!-- 脉冲线渐变 -->
    <linearGradient id="hpm" x1="16" y1="48" x2="80" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c49b1a"/>
      <stop offset="25%" stop-color="#FCD535"/>
      <stop offset="50%" stop-color="#fff1a8"/>
      <stop offset="75%" stop-color="#FCD535"/>
      <stop offset="100%" stop-color="#f0b90b"/>
    </linearGradient>

    <!-- 面积渐变 -->
    <linearGradient id="haf" x1="48" y1="28" x2="48" y2="75" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FCD535" stop-opacity="0.16"/>
      <stop offset="50%" stop-color="#FCD535" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FCD535" stop-opacity="0"/>
    </linearGradient>

    <!-- 网格淡出 -->
    <linearGradient id="hgf" x1="48" y1="18" x2="48" y2="78" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FCD535" stop-opacity="0"/>
      <stop offset="30%" stop-color="#FCD535" stop-opacity="0.06"/>
      <stop offset="70%" stop-color="#FCD535" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#FCD535" stop-opacity="0"/>
    </linearGradient>

    <!-- 玻璃高光 -->
    <linearGradient id="hgl" x1="14" y1="6" x2="70" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="25%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- 文字金属渐变 -->
    <linearGradient id="htg" x1="98" y1="40" x2="380" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c49b1a"/>
      <stop offset="25%" stop-color="#FCD535"/>
      <stop offset="50%" stop-color="#fff1a8"/>
      <stop offset="75%" stop-color="#FCD535"/>
      <stop offset="100%" stop-color="#c49b1a"/>
    </linearGradient>

    <!-- 文字底线渐变 -->
    <linearGradient id="hul" x1="100" y1="0" x2="360" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FCD535" stop-opacity="0"/>
      <stop offset="20%" stop-color="#FCD535" stop-opacity="0.4"/>
      <stop offset="80%" stop-color="#FCD535" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FCD535" stop-opacity="0"/>
    </linearGradient>

    <clipPath id="hcc">
      <rect x="6" y="6" width="84" height="84" rx="20" ry="20"/>
    </clipPath>
  </defs>

  <!-- ====== 图标部分 ====== -->
  <g clip-path="url(#hcc)">
    <!-- 深色底 -->
    <rect x="6" y="6" width="84" height="84" fill="url(#hbg)"/>
    <rect x="6" y="6" width="84" height="84" fill="url(#hbg)" filter="url(#hn)"/>

    <!-- 网格 -->
    <g>
      <line x1="16" y1="30" x2="80" y2="30" stroke="url(#hgf)" stroke-width="0.3"/>
      <line x1="16" y1="42" x2="80" y2="42" stroke="url(#hgf)" stroke-width="0.3"/>
      <line x1="16" y1="54" x2="80" y2="54" stroke="url(#hgf)" stroke-width="0.3"/>
      <line x1="16" y1="66" x2="80" y2="66" stroke="url(#hgf)" stroke-width="0.3"/>
      <line x1="28" y1="18" x2="28" y2="80" stroke="url(#hgf)" stroke-width="0.3"/>
      <line x1="42" y1="18" x2="42" y2="80" stroke="url(#hgf)" stroke-width="0.3"/>
      <line x1="56" y1="18" x2="56" y2="80" stroke="url(#hgf)" stroke-width="0.3"/>
      <line x1="70" y1="18" x2="70" y2="80" stroke="url(#hgf)" stroke-width="0.3"/>
    </g>

    <!-- K线柱 -->
    <g opacity="0.09">
      <rect x="23" y="48" width="2" height="16" rx="0.4" fill="#0ecb81"/>
      <rect x="31" y="42" width="2" height="22" rx="0.4" fill="#0ecb81"/>
      <rect x="39" y="52" width="2" height="12" rx="0.4" fill="#f6465d"/>
      <rect x="47" y="38" width="2" height="26" rx="0.4" fill="#0ecb81"/>
      <rect x="55" y="46" width="2" height="18" rx="0.4" fill="#f6465d"/>
      <rect x="63" y="34" width="2" height="30" rx="0.4" fill="#0ecb81"/>
      <rect x="71" y="40" width="2" height="24" rx="0.4" fill="#0ecb81"/>
    </g>

    <!-- 面积 -->
    <path d="M16 62 L26 60 L36 57 L44 61 L52 50 L58 28 L64 66 L70 54 L76 48 L82 42 L82 78 L16 78 Z" fill="url(#haf)"/>

    <!-- 脉冲线系统 -->
    <polyline points="16,62 26,60 36,57 44,61 52,50 58,28 64,66 70,54 76,48 82,42"
      stroke="#FCD535" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"
      fill="none" opacity="0.12" filter="url(#hpg)"/>
    <polyline points="16,62 26,60 36,57 44,61 52,50 58,28 64,66 70,54 76,48 82,42"
      stroke="#FCD535" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
      fill="none" opacity="0.35"/>
    <polyline points="16,62 26,60 36,57 44,61 52,50 58,28 64,66 70,54 76,48 82,42"
      stroke="url(#hpm)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"
      fill="none"/>
    <polyline points="16,61.4 26,59.4 36,56.4 44,60.4 52,49.4 58,27.4 64,65.4 70,53.4 76,47.4 82,41.4"
      stroke="#ffffff" stroke-width="0.4" stroke-linecap="round" stroke-linejoin="round"
      fill="none" opacity="0.2"/>

    <!-- 星芒 -->
    <g filter="url(#hsp)">
      <circle cx="58" cy="28" r="1.8" fill="#fff8d6" opacity="0.8"/>
    </g>
    <line x1="58" y1="22" x2="58" y2="34" stroke="#fff8d6" stroke-width="0.4" opacity="0.4"/>
    <line x1="52" y1="28" x2="64" y2="28" stroke="#fff8d6" stroke-width="0.4" opacity="0.4"/>
    <circle cx="58" cy="28" r="3" fill="none" stroke="#FCD535" stroke-width="0.6" opacity="0.4"/>
    <circle cx="58" cy="28" r="1.3" fill="#FCD535"/>
    <circle cx="58" cy="28" r="0.5" fill="#fff8d6"/>

    <!-- 终点 -->
    <circle cx="82" cy="42" r="2.2" fill="none" stroke="#FCD535" stroke-width="0.5" opacity="0.35"/>
    <circle cx="82" cy="42" r="1" fill="#FCD535"/>

    <!-- 玻璃 -->
    <rect x="6" y="6" width="84" height="84" fill="url(#hgl)" rx="20" ry="20"/>
  </g>

  <!-- 图标边框 -->
  <rect x="6.5" y="6.5" width="83" height="83" rx="19.5" ry="19.5" fill="none" stroke="url(#hbdr)" stroke-width="1"/>
  <rect x="8" y="8" width="80" height="80" rx="18" ry="18" fill="none" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.05"/>

  <!-- ====== 文字部分 ====== -->
  <g filter="url(#hds)">
    <!-- 主标题 -->
    <text x="104" y="52" font-family="Inter, -apple-system, Arial, sans-serif" font-weight="700" font-size="36" letter-spacing="2" fill="#eaecef" opacity="0.95">
      Stock<tspan fill="url(#htg)">Pulse</tspan>
    </text>
  </g>

  <!-- 副标题 -->
  <text x="106" y="72" font-family="Inter, -apple-system, Arial, sans-serif" font-weight="400" font-size="13" letter-spacing="4" fill="#707a8a">
    股脉 · 智能投研平台
  </text>

  <!-- 品牌底线 -->
  <line x1="104" y1="80" x2="350" y2="80" stroke="url(#hul)" stroke-width="0.8"/>
</svg>
