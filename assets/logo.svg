<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- ====== 滤镜系统 ====== -->

    <!-- 噪点纹理：为背景增加微粒质感 -->
    <filter id="noise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feComponentTransfer in="grayNoise" result="alphaMap">
        <feFuncA type="linear" slope="0.06" intercept="0"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="alphaMap" mode="overlay"/>
    </filter>

    <!-- 外发光：品牌金色光晕 -->
    <filter id="outerGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="16" result="blur"/>
      <feColorMatrix type="matrix" in="blur" result="colorBlur"
        values="1 0 0 0 0
                0 0.8 0 0 0
                0 0 0.2 0 0
                0 0 0 0.4 0"/>
      <feMerge>
        <feMergeNode in="colorBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 脉冲线发光 -->
    <filter id="pulseGlow" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 尖峰星芒闪光 -->
    <filter id="sparkle" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="bigBlur"/>
      <feMerge>
        <feMergeNode in="bigBlur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 投影（用于文字和整体） -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.5"/>
    </filter>

    <!-- ====== 渐变系统 ====== -->

    <!-- 背景：深色多层径向渐变 -->
    <radialGradient id="bgRadial" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a2030"/>
      <stop offset="60%" stop-color="#0f1319"/>
      <stop offset="100%" stop-color="#080a0e"/>
    </radialGradient>

    <!-- 边框：金属金色渐变（模拟光照方向） -->
    <linearGradient id="borderGold" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffeaa0" stop-opacity="0.9"/>
      <stop offset="25%" stop-color="#FCD535" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#c49b1a" stop-opacity="0.3"/>
      <stop offset="75%" stop-color="#FCD535" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffeaa0" stop-opacity="0.7"/>
    </linearGradient>

    <!-- 脉冲线主渐变：金属金色 -->
    <linearGradient id="pulseMain" x1="80" y1="200" x2="432" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c49b1a"/>
      <stop offset="20%" stop-color="#FCD535"/>
      <stop offset="50%" stop-color="#fff1a8"/>
      <stop offset="80%" stop-color="#FCD535"/>
      <stop offset="100%" stop-color="#f0b90b"/>
    </linearGradient>

    <!-- 脉冲线下方面积渐变 -->
    <linearGradient id="areaFill" x1="256" y1="140" x2="256" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FCD535" stop-opacity="0.20"/>
      <stop offset="40%" stop-color="#FCD535" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FCD535" stop-opacity="0"/>
    </linearGradient>

    <!-- 玻璃反射高光渐变 -->
    <linearGradient id="glassSheen" x1="100" y1="0" x2="400" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="35%" stop-color="#ffffff" stop-opacity="0.03"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- 顶部弧形高光 -->
    <radialGradient id="topHighlight" cx="50%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- 网格线渐变（微弱） -->
    <linearGradient id="gridFade" x1="256" y1="80" x2="256" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FCD535" stop-opacity="0"/>
      <stop offset="30%" stop-color="#FCD535" stop-opacity="0.06"/>
      <stop offset="70%" stop-color="#FCD535" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#FCD535" stop-opacity="0"/>
    </linearGradient>

    <!-- 星芒发射光 -->
    <radialGradient id="starBurst" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff8d6" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#FCD535" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FCD535" stop-opacity="0"/>
    </radialGradient>

    <!-- 文字描边金属渐变 -->
    <linearGradient id="textGold" x1="120" y1="450" x2="400" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c49b1a"/>
      <stop offset="30%" stop-color="#FCD535"/>
      <stop offset="50%" stop-color="#fff1a8"/>
      <stop offset="70%" stop-color="#FCD535"/>
      <stop offset="100%" stop-color="#c49b1a"/>
    </linearGradient>

    <!-- ====== 裁切路径 ====== -->
    <clipPath id="cardClip">
      <rect width="512" height="512" rx="88" ry="88"/>
    </clipPath>

    <clipPath id="innerClip">
      <rect x="6" y="6" width="500" height="500" rx="82" ry="82"/>
    </clipPath>
  </defs>

  <!-- ====== 第1层：外部投影 ====== -->
  <rect x="8" y="12" width="496" height="496" rx="88" ry="88" fill="#000" opacity="0.4" filter="url(#dropShadow)"/>

  <!-- ====== 第2层：主体卡片 ====== -->
  <g clip-path="url(#cardClip)">
    <!-- 深色基底 -->
    <rect width="512" height="512" fill="url(#bgRadial)"/>

    <!-- 噪点纹理叠加 -->
    <rect width="512" height="512" fill="url(#bgRadial)" filter="url(#noise)"/>

    <!-- ====== 第3层：数据网格背景 ====== -->
    <g opacity="1">
      <!-- 横向网格线 -->
      <line x1="60" y1="160" x2="452" y2="160" stroke="url(#gridFade)" stroke-width="0.5"/>
      <line x1="60" y1="210" x2="452" y2="210" stroke="url(#gridFade)" stroke-width="0.5"/>
      <line x1="60" y1="260" x2="452" y2="260" stroke="url(#gridFade)" stroke-width="0.5"/>
      <line x1="60" y1="310" x2="452" y2="310" stroke="url(#gridFade)" stroke-width="0.5"/>
      <line x1="60" y1="360" x2="452" y2="360" stroke="url(#gridFade)" stroke-width="0.5"/>
      <!-- 纵向网格线 -->
      <line x1="120" y1="100" x2="120" y2="400" stroke="url(#gridFade)" stroke-width="0.5"/>
      <line x1="190" y1="100" x2="190" y2="400" stroke="url(#gridFade)" stroke-width="0.5"/>
      <line x1="260" y1="100" x2="260" y2="400" stroke="url(#gridFade)" stroke-width="0.5"/>
      <line x1="330" y1="100" x2="330" y2="400" stroke="url(#gridFade)" stroke-width="0.5"/>
      <line x1="400" y1="100" x2="400" y2="400" stroke="url(#gridFade)" stroke-width="0.5"/>
    </g>

    <!-- ====== 第4层：K线柱影（背景装饰元素） ====== -->
    <g opacity="0.12">
      <!-- 若干模拟K线柱体，增加金融质感 -->
      <rect x="107" y="260" width="6" height="80" rx="1" fill="#0ecb81"/>
      <rect x="127" y="240" width="6" height="100" rx="1" fill="#0ecb81"/>
      <rect x="147" y="280" width="6" height="60" rx="1" fill="#f6465d"/>
      <rect x="167" y="250" width="6" height="90" rx="1" fill="#0ecb81"/>
      <rect x="187" y="270" width="6" height="70" rx="1" fill="#f6465d"/>
      <rect x="207" y="230" width="6" height="110" rx="1" fill="#0ecb81"/>
      <rect x="227" y="260" width="6" height="80" rx="1" fill="#0ecb81"/>
      <rect x="247" y="290" width="6" height="50" rx="1" fill="#f6465d"/>
      <rect x="267" y="220" width="6" height="120" rx="1" fill="#0ecb81"/>
      <rect x="287" y="250" width="6" height="90" rx="1" fill="#0ecb81"/>
      <rect x="307" y="270" width="6" height="70" rx="1" fill="#f6465d"/>
      <rect x="327" y="210" width="6" height="130" rx="1" fill="#0ecb81"/>
      <rect x="347" y="240" width="6" height="100" rx="1" fill="#0ecb81"/>
      <rect x="367" y="200" width="6" height="140" rx="1" fill="#0ecb81"/>
      <rect x="387" y="230" width="6" height="110" rx="1" fill="#f6465d"/>
      <rect x="407" y="190" width="6" height="150" rx="1" fill="#0ecb81"/>
    </g>

    <!-- ====== 第5层：脉冲面积图（渐变填充区） ====== -->
    <path
      d="M80 330 L125 325 L160 310 L195 330 L225 270 L256 138 L288 355 L315 285 L345 255 L380 238 L415 215 L440 195 L440 400 L80 400 Z"
      fill="url(#areaFill)"
    />

    <!-- ====== 第6层：脉冲趋势线（核心图形） ====== -->
    <!-- 底层宽发光 -->
    <polyline
      points="80,330 125,325 160,310 195,330 225,270 256,138 288,355 315,285 345,255 380,238 415,215 440,195"
      stroke="#FCD535"
      stroke-width="16"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
      opacity="0.15"
      filter="url(#pulseGlow)"
    />
    <!-- 中层光晕 -->
    <polyline
      points="80,330 125,325 160,310 195,330 225,270 256,138 288,355 315,285 345,255 380,238 415,215 440,195"
      stroke="#FCD535"
      stroke-width="6"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
      opacity="0.5"
    />
    <!-- 主线：金属渐变描边 -->
    <polyline
      points="80,330 125,325 160,310 195,330 225,270 256,138 288,355 315,285 345,255 380,238 415,215 440,195"
      stroke="url(#pulseMain)"
      stroke-width="3.5"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />
    <!-- 高光线：白色细线模拟金属高光 -->
    <polyline
      points="80,329 125,324 160,309 195,329 225,269 256,137 288,354 315,284 345,254 380,237 415,214 440,194"
      stroke="#ffffff"
      stroke-width="1"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
      opacity="0.25"
    />

    <!-- ====== 第7层：关键点标记 ====== -->

    <!-- 脉冲尖峰（最高点）：星芒闪光效果 -->
    <g filter="url(#sparkle)">
      <circle cx="256" cy="138" r="6" fill="#fff8d6" opacity="0.8"/>
    </g>
    <!-- 十字星芒 -->
    <line x1="256" y1="118" x2="256" y2="158" stroke="#fff8d6" stroke-width="1" opacity="0.5"/>
    <line x1="236" y1="138" x2="276" y2="138" stroke="#fff8d6" stroke-width="1" opacity="0.5"/>
    <!-- 外环 -->
    <circle cx="256" cy="138" r="10" fill="none" stroke="#FCD535" stroke-width="1.5" opacity="0.6"/>
    <!-- 内实心 -->
    <circle cx="256" cy="138" r="4" fill="#FCD535"/>
    <circle cx="256" cy="138" r="2" fill="#fff8d6"/>

    <!-- 终点标记 -->
    <circle cx="440" cy="195" r="7" fill="none" stroke="#FCD535" stroke-width="1.5" opacity="0.5"/>
    <circle cx="440" cy="195" r="3.5" fill="#FCD535"/>
    <circle cx="440" cy="195" r="1.5" fill="#fff8d6"/>

    <!-- 起点标记（微弱） -->
    <circle cx="80" cy="330" r="3" fill="#FCD535" opacity="0.3"/>

    <!-- ====== 第8层：上升趋势参考线 ====== -->
    <line x1="80" y1="330" x2="440" y2="195" stroke="#FCD535" stroke-opacity="0.08" stroke-width="1" stroke-dasharray="6,8"/>

    <!-- ====== 第9层：玻璃反射高光 ====== -->
    <rect width="512" height="512" fill="url(#glassSheen)" rx="88" ry="88"/>
    <rect width="512" height="280" fill="url(#topHighlight)" rx="88" ry="88"/>

    <!-- ====== 第10层：品牌文字 ====== -->
    <g filter="url(#dropShadow)">
      <text x="256" y="460" text-anchor="middle" font-family="Inter, -apple-system, Arial, sans-serif" font-weight="700" font-size="38" letter-spacing="8" fill="#eaecef" opacity="0.95">
        STOCK<tspan fill="url(#textGold)">PULSE</tspan>
      </text>
    </g>
    <!-- 文字下方的品牌线 -->
    <line x1="160" y1="472" x2="352" y2="472" stroke="url(#textGold)" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- ====== 第11层：金属边框 ====== -->
  <rect x="2" y="2" width="508" height="508" rx="86" ry="86" fill="none" stroke="url(#borderGold)" stroke-width="1.5"/>
  <!-- 内边框高光（模拟倒角） -->
  <rect x="6" y="6" width="500" height="500" rx="82" ry="82" fill="none" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.06"/>
</svg>
